<svg width="300" height="260" viewBox="0 0 300 260" xmlns="http://www.w3.org/2000/svg">
  <!-- Trucker's Hitch -->
  <rect width="300" height="260" fill="#FAF5EB" rx="8"/>
  <text x="150" y="22" fill="#5C3A1E" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle">Trucker's Hitch</text>
  <text x="150" y="40" fill="#8B5E3C" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">Step 1: Anchor rope and create slip loop in standing part</text>
  <line x1="20" y1="46" x2="280" y2="46" stroke="#C4A882" stroke-width="1"/>
  <rect x="60" y="55" width="180" height="25" rx="5" fill="#C4A882" stroke="#8B5E3C" stroke-width="2"/>
  <text x="150" y="72" fill="#5C3A1E" font-family="Arial,sans-serif" font-size="10" text-anchor="middle">Top anchor / bar</text>
  <path d="M 90 80 L 90 180" fill="none" stroke="#8B4513" stroke-width="10" stroke-linecap="round"/>
  <path d="M 90 160 Q 110 145, 120 160 Q 130 175, 110 180 Q 90 185, 90 170" fill="none" stroke="#8B4513" stroke-width="8" stroke-linecap="round"/>
  <circle cx="110" cy="163" r="5" fill="#D2691E"/>
  <text x="30" y="130" fill="#8B4513" font-family="Arial,sans-serif" font-size="11">Rope</text>
  <text x="130" y="165" fill="#D2691E" font-family="Arial,sans-serif" font-size="11">Slip loop</text>
  <text x="150" y="245" fill="#8B4513" font-family="Arial,sans-serif" font-size="11" text-anchor="middle">Make slip loop (bight) in rope</text>
</svg>