<svg width="300" height="260" viewBox="0 0 300 260" xmlns="http://www.w3.org/2000/svg">
  <!-- Clove Hitch -->
  <rect width="300" height="260" fill="#FAF5EB" rx="8"/>
  <text x="150" y="22" fill="#5C3A1E" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle">Clove Hitch</text>
  <text x="150" y="40" fill="#8B5E3C" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">Step 1: Pass rope over and around the post</text>
  <line x1="20" y1="46" x2="280" y2="46" stroke="#C4A882" stroke-width="1"/>
  <rect x="130" y="55" width="40" height="180" rx="5" fill="#C4A882" stroke="#8B5E3C" stroke-width="2"/>
  <path d="M 60 130 L 130 130 Q 130 130, 130 130" fill="none" stroke="#8B4513" stroke-width="10" stroke-linecap="round"/>
  <path d="M 130 130 Q 170 130, 170 130 L 240 110" fill="none" stroke="#D2691E" stroke-width="10" stroke-linecap="round"/>
  <text x="40" y="120" fill="#8B4513" font-family="Arial,sans-serif" font-size="11">Standing</text>
  <text x="215" y="105" fill="#D2691E" font-family="Arial,sans-serif" font-size="11">Working end</text>
  <text x="105" y="175" fill="#555" font-family="Arial,sans-serif" font-size="11">Post</text>
  <text x="150" y="248" fill="#8B4513" font-family="Arial,sans-serif" font-size="11" text-anchor="middle">Cross over top of post</text>
</svg>