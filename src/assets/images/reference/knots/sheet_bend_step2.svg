<svg width="300" height="260" viewBox="0 0 300 260" xmlns="http://www.w3.org/2000/svg">
  <!-- Sheet Bend -->
  <rect width="300" height="260" fill="#FAF5EB" rx="8"/>
  <text x="150" y="22" fill="#5C3A1E" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle">Sheet Bend</text>
  <text x="150" y="40" fill="#8B5E3C" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">Step 2: Pass thin rope up through the bight</text>
  <line x1="20" y1="46" x2="280" y2="46" stroke="#C4A882" stroke-width="1"/>
  <path d="M 80 100 Q 80 170, 150 175 Q 220 170, 220 100" fill="none" stroke="#8B4513" stroke-width="10" stroke-linecap="round"/>
  <path d="M 80 100 L 80 75" fill="none" stroke="#8B4513" stroke-width="10" stroke-linecap="round"/>
  <path d="M 220 100 L 220 75" fill="none" stroke="#8B4513" stroke-width="10" stroke-linecap="round"/>
  <path d="M 150 220 L 150 175" fill="none" stroke="#2E6B8B" stroke-width="8" stroke-linecap="round"/>
  <path d="M 150 175 L 148 170 M 150 175 L 152 170" fill="none" stroke="#2E6B8B" stroke-width="3"/>
  <text x="175" y="220" fill="#2E6B8B" font-family="Arial,sans-serif" font-size="11">Thin rope enters</text>
  <text x="175" y="232" fill="#2E6B8B" font-family="Arial,sans-serif" font-size="11">bight here</text>
</svg>