<svg width="300" height="260" viewBox="0 0 300 260" xmlns="http://www.w3.org/2000/svg">
  <!-- Overhand Knot -->
  <rect width="300" height="260" fill="#FAF5EB" rx="8"/>
  <text x="150" y="22" fill="#5C3A1E" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle">Overhand Knot</text>
  <text x="150" y="40" fill="#8B5E3C" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">Step 3: Pass end through loop and pull tight</text>
  <line x1="20" y1="46" x2="280" y2="46" stroke="#C4A882" stroke-width="1"/>
  <path d="M 150 55 L 150 120" fill="none" stroke="#8B4513" stroke-width="10" stroke-linecap="round"/>
  <path d="M 140 120 Q 100 130, 110 160 Q 120 185, 150 180 Q 180 175, 185 155 Q 190 135, 165 125 L 155 120" fill="none" stroke="#8B4513" stroke-width="10" stroke-linecap="round"/>
  <path d="M 150 180 Q 148 195, 150 215" fill="none" stroke="#D2691E" stroke-width="10" stroke-linecap="round"/>
  <text x="85" y="230" fill="#5C3A1E" font-family="Arial,sans-serif" font-size="12" font-weight="bold">Pull to tighten</text>
  <path d="M 150 215 L 140 230 M 150 215 L 160 230" fill="none" stroke="#D2691E" stroke-width="3" stroke-linecap="round"/>
  <text x="65" y="60" fill="#555" font-family="Arial,sans-serif" font-size="11">Standing part</text>
  <text x="75" y="167" fill="#555" font-family="Arial,sans-serif" font-size="11">Knot</text>
  <text x="165" y="220" fill="#D2691E" font-family="Arial,sans-serif" font-size="11">Pull</text>
</svg>