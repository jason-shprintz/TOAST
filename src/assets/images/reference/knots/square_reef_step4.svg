  <rect x="115" y="130" width="70" height="35" rx="10" fill="none" stroke="#5C3A1E" stroke-width="3" stroke-dasharray="5,3"/>
  <path d="M 125 130 L 85 90" fill="none" stroke="#8B4513" stroke-width="10" stroke-linecap="round"/>
  <path d="M 175 130 L 215 90" fill="none" stroke="#2E6B8B" stroke-width="10" stroke-linecap="round"/>
  <path d="M 125 165 L 85 210" fill="none" stroke="#8B4513" stroke-width="10" stroke-linecap="round"/>
  <path d="M 175 165 L 215 210" fill="none" stroke="#2E6B8B" stroke-width="10" stroke-linecap="round"/>
  <text x="150" y="238" fill="#5C3A1E" font-family="Arial,sans-serif" font-size="12" font-weight="bold" text-anchor="middle">Pull all four ends tight</text>
