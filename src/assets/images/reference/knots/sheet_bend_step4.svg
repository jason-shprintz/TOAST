<svg width="300" height="260" viewBox="0 0 300 260" xmlns="http://www.w3.org/2000/svg">
  <!-- Sheet Bend -->
  <rect width="300" height="260" fill="#FAF5EB" rx="8"/>
  <text x="150" y="22" fill="#5C3A1E" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle">Sheet Bend</text>
  <text x="150" y="40" fill="#8B5E3C" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">Step 4: Tuck working end under itself and pull tight</text>
  <line x1="20" y1="46" x2="280" y2="46" stroke="#C4A882" stroke-width="1"/>
  <path d="M 80 110 Q 80 165, 150 168 Q 220 165, 220 110" fill="none" stroke="#8B4513" stroke-width="10" stroke-linecap="round"/>
  <path d="M 80 110 L 80 80" fill="none" stroke="#8B4513" stroke-width="10" stroke-linecap="round"/>
  <path d="M 220 110 L 220 80" fill="none" stroke="#8B4513" stroke-width="10" stroke-linecap="round"/>
  <path d="M 150 168 Q 100 155, 80 128 Q 74 118, 80 112" fill="none" stroke="#2E6B8B" stroke-width="8" stroke-linecap="round"/>
  <path d="M 80 112 Q 100 102, 150 106 Q 185 106, 215 116" fill="none" stroke="#2E6B8B" stroke-width="8" stroke-linecap="round"/>
  <path d="M 215 116 L 240 120" fill="none" stroke="#2E6B8B" stroke-width="8" stroke-linecap="round"/>
  <text x="150" y="232" fill="#5C3A1E" font-family="Arial,sans-serif" font-size="12" font-weight="bold" text-anchor="middle">Tighten by pulling ends</text>
</svg>