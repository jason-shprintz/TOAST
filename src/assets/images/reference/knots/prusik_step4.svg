<svg width="300" height="260" viewBox="0 0 300 260" xmlns="http://www.w3.org/2000/svg">
  <!-- Prusik Knot -->
  <rect width="300" height="260" fill="#FAF5EB" rx="8"/>
  <text x="150" y="22" fill="#5C3A1E" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle">Prusik Knot</text>
  <text x="150" y="40" fill="#8B5E3C" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">Step 4: Dress knot — grips rope under load; slides when loose</text>
  <line x1="20" y1="46" x2="280" y2="46" stroke="#C4A882" stroke-width="1"/>
  <path d="M 150 55 L 150 225" fill="none" stroke="#8B4513" stroke-width="14" stroke-linecap="round"/>
  <rect x="110" y="98" width="80" height="60" rx="10" fill="none" stroke="#2E6B8B" stroke-width="8"/>
  <path d="M 150 158 L 120 195 M 150 158 L 180 195" fill="none" stroke="#2E6B8B" stroke-width="8" stroke-linecap="round"/>
  <text x="200" y="115" fill="#2E6B8B" font-family="Arial,sans-serif" font-size="11">Grips under load</text>
  <text x="200" y="130" fill="#2E6B8B" font-family="Arial,sans-serif" font-size="11">Slides when loose</text>
  <text x="150" y="248" fill="#5C3A1E" font-family="Arial,sans-serif" font-size="12" font-weight="bold" text-anchor="middle">Friction hitch complete</text>
</svg>