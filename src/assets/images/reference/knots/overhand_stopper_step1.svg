<svg width="300" height="260" viewBox="0 0 300 260" xmlns="http://www.w3.org/2000/svg">
  <!-- Overhand Knot -->
  <rect width="300" height="260" fill="#FAF5EB" rx="8"/>
  <text x="150" y="22" fill="#5C3A1E" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle">Overhand Knot</text>
  <text x="150" y="40" fill="#8B5E3C" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">Step 1: Hold the rope</text>
  <line x1="20" y1="46" x2="280" y2="46" stroke="#C4A882" stroke-width="1"/>
  <path d="M 150 80 L 150 200" fill="none" stroke="#8B4513" stroke-width="10" stroke-linecap="round"/>
  <circle cx="150" cy="80" r="6" fill="#5C3A1E"/>
  <circle cx="150" cy="200" r="6" fill="#D2691E"/>
  <text x="170" y="84" fill="#555" font-family="Arial,sans-serif" font-size="11">Standing part</text>
  <text x="170" y="204" fill="#D2691E" font-family="Arial,sans-serif" font-size="11">Working end</text>
</svg>